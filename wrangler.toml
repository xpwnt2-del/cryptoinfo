# ── Cloudflare Containers + Pages deployment ──────────────────────────────────
#
# CryptoInfo uses a Python Flask backend that runs inside a Docker container.
# Deployment options:
#
#   Option A – Cloudflare Containers (recommended)
#     1. Build & push the image:
#          docker build -t cryptoinfo .
#          wrangler containers push cryptoinfo
#     2. Deploy the Worker + container binding:
#          wrangler deploy
#
#   Option B – Cloudflare Tunnel (self-hosted)
#     1. Start the app locally:  docker run -p 8080:8080 --env-file .env cryptoinfo
#     2. Expose it:              cloudflared tunnel --url http://localhost:8080
#
#   Option C – Cloudflare Pages (static assets only)
#     The static/ folder is published to the CDN automatically on every push.
#
# ── Worker (entry-point for Cloudflare Containers) ────────────────────────────
name = "cryptoinfo"
compatibility_date = "2024-01-01"
main = "worker.js"            # Thin Worker that proxies requests to the container

# ── Container binding ─────────────────────────────────────────────────────────
# Bind the Worker to a container class so incoming requests are forwarded to
# the running Flask container.  The container image is built from the Dockerfile
# in the project root.
#
# To find your Cloudflare Account ID:
#   https://dash.cloudflare.com/ → select domain → Overview → API section
# Replace <CLOUDFLARE_ACCOUNT_ID> below with your actual account ID, e.g.
#   image = "registry.cloudflare.com/abc123def456/cryptoinfo:latest"
#
# Ref: https://developers.cloudflare.com/containers/
[[containers]]
class_name = "CryptoinfoApp"
# Image is resolved at deploy time by `wrangler containers push`
image = "registry.cloudflare.com/<CLOUDFLARE_ACCOUNT_ID>/cryptoinfo:latest"
# Max number of container instances (scale to zero when idle)
max_instances = 2

# ── Environment variables (set these in the Cloudflare dashboard) ──────────
# Do NOT commit real secrets here – use the Cloudflare Pages / Workers
# "Variables & Secrets" panel or `wrangler secret put` instead.
[vars]
FLASK_ENV = "production"
PORT = "8080"

